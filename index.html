<body>
  <div id="root"></div>
  <script>
    const root=document.getElementById('root');
    const state={logged:false,role:'comercial',screen:'dashboard'};
    const commercialNav=[['dashboard','▦','Dashboard'],['clientes','👥','Clientes'],['oportunidades','◎','Oportunidades'],['propostas','▤','Propostas'],['metas','⚑','Metas'],['relatorios','▥','Relatórios']];

    const rowsOpp=[['Implantação ConectaFlow','Tech Solutions LTDA','<span class="tag">Apresentar</span>','R$ 75.000','70%','10/06/2024','CS Carlos Silva'],['Renovação Contrato','Indústria Aliança SA','<span class="tag orange">Negociação</span>','R$ 45.000','80%','18/06/2024','FL Fernanda Lima'],['Expansão de Licenças','Grupo Horizonte','<span class="tag orange">Negociação</span>','R$ 38.500','60%','25/06/2024','RO Rafael Oliveira'],['Novo Projeto Analytics','Varejo Comex','<span class="tag green">Qualificar</span>','R$ 22.000','40%','05/07/2024','JS Juliana Santos']];
    function browser(title,path){return `<div class="browser"><div class="traffic"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><div class="tab"><span class="logo" style="width:20px;height:20px;border-radius:6px;font-size:12px">C</span>ConectaFlow | ${title}</div><div class="addr">🔒 app.conectaflow.com/${path}</div><div class="miniavatar">${state.role==='comercial'?'CS':'FC'}</div></div>`}
    function login(){return `${browser('Login','login')}<section class="login"><div class="hero"><div class="brand"><span class="logo">C</span>ConectaFlow</div><h1>Integração que conecta<br>seu time ao <span>resultado.</span></h1><p>O ConectaFlow integra Comercial e Financeiro em uma plataforma inteligente para vender mais, receber melhor e tomar decisões com confiança.</p><div class="benefit"><span class="benefit-icon">↗</span><div><b>Visão completa do negócio</b><br><small>Acompanhe vendas, metas e recebimentos em tempo real.</small></div></div><div class="benefit"><span class="benefit-icon">👥</span><div><b>Integração Comercial e Financeiro</b><br><small>Dados conectados para processos mais ágeis e seguros.</small></div></div><div class="benefit"><span class="benefit-icon">🛡</span><div><b>Mais controle e previsibilidade</b><br><small>Relatórios inteligentes para decisões com mais confiança.</small></div></div><div class="info-panel"><h3>Protótipo navegável para apresentação</h3><div class="info-grid"><div class="info-tile"><small>Módulos</small><b>2</b><small>Comercial e Financeiro</small></div><div class="info-tile"><small>Telas</small><b>10+</b><small>Fluxos clicáveis</small></div><div class="info-tile"><small>Acesso</small><b>QR</b><small>Direto no navegador</small></div></div></div></div><div class="loginbox"><div class="login-card"><div class="center"><div class="logo" style="margin:auto;width:48px;height:48px;font-size:24px">C</div><h1 style="margin:12px 0 4px">ConectaFlow</h1><p class="muted">Faça login para acessar sua conta</p></div><div style="font-weight:850;margin-top:18px">Entrar como</div><div class="role"><button class="${state.role==='comercial'?'active':''}" onclick="state.role='comercial';render()">👥 Comercial</button><button class="${state.role==='financeiro'?'active':''}" onclick="state.role='financeiro';render()">👥 Financeiro</button></div><div class="field"><label>E-mail</label><input value="seu@email.com" /></div><div class="field"><label>Senha</label><input type="password" value="12345678" /></div><div class="formrow"><label><input type="checkbox"> Lembrar-me</label><a class="link">Esqueci minha senha</a></div><button class="btn primary" style="width:100%;height:54px;font-size:17px" onclick="state.logged=true;state.screen='dashboard';render()">Entrar</button><p class="center muted">Ainda não tem uma conta? <a class="link">Fale com nosso time</a></p></div></div></section>`}
    function sidebar(){const nav=state.role==='comercial'?commercialNav:financeNav; const profile=state.role==='comercial'?`<div class="avatar">CS</div><div><b>Carlos Silva</b><small>Perfil: Comercial</small><div class="status"><i></i>Online</div></div>`:`<div class="avatar">↗</div><div><b>Perfil: Financeiro</b><small>Área financeira</small><div class="status"><i></i>Ativo</div></div>`;return `<aside class="sidebar"><div class="brand"><span class="logo">C</span>ConectaFlow</div><div class="profile">${profile}<span style="margin-left:auto">⌄</span></div><nav class="nav">${nav.map(n=>`<button class="${state.screen===n[0]?'active':''}" onclick="state.screen='${n[0]}';render()"><span>${n[1]}</span>${n[2]}</button>`).join('')}</nav><div class="collapse">← Recolher menu</div></aside>`}
    function appShell(content,title,path){return `${browser(title,path)}<div class="app">${sidebar()}<main class="main">${content}</main></div>`}
    function kpi(icon, color, label, value, trend, down=false){return `<div class="card kpi"><div class="icon ${color||''}">${icon}</div><div><span class="muted">${label} ⓘ</span><b>${value}</b><span class="trend ${down?'down':''}">▲ ${trend}</span></div></div>`}
    function header(title,sub,btn,date=false){return `<div class="topbar"><div class="title"><h1>${title}</h1><p>${sub}</p></div><div class="actions">${date?`<button class="btn ghost">📅 01/05/2024 - 31/05/2024</button>`:''}<button class="btn primary">${btn}</button></div></div>`}
    function lineChart(){return `<div class="chart"><div class="line"><svg viewBox="0 0 640 160"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0b63f6" stop-opacity=".25"/><stop offset="1" stop-color="#0b63f6" stop-opacity="0"/></linearGradient></defs><path d="M20,116 L140,95 L260,82 L380,55 L500,54 L620,24 L620,160 L20,160Z" fill="url(#g)"/><polyline points="20,116 140,95 260,82 380,55 500,54 620,24" fill="none" stroke="#0b63f6" stroke-width="4"/><g fill="#fff" stroke="#0b63f6" stroke-width="4"><circle cx="20" cy="116" r="5"/><circle cx="140" cy="95" r="5"/><circle cx="260" cy="82" r="5"/><circle cx="380" cy="55" r="5"/><circle cx="500" cy="54" r="5"/><circle cx="620" cy="24" r="5"/></g></svg></div></div><div class="months"><span>Dez/23</span><span>Jan/24</span><span>Fev/24</span><span>Mar/24</span><span>Abr/24</span><span>Mai/24</span></div>`}
    function cashChart(){let bars=Array.from({length:28},(_,i)=>`<span style="height:${40+(i*17)%92}px;background:${i%3===0?'var(--red)':'#20c997'};align-self:${i%3===0?'end':'auto'}"></span>`).join('');return `<div style="height:230px;display:flex;align-items:flex-end;gap:8px;border-left:1px solid #dbe5ef;border-bottom:1px solid #dbe5ef;padding:12px 10px;background:repeating-linear-gradient(to top,transparent 0,transparent 45px,#edf2f7 46px)">${bars}</div><p class="muted">Entradas, saídas e saldo projetado por período</p>`}
